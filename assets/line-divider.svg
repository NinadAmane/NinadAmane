<svg xmlns="http://www.w3.org/2000/svg" width="900" height="12" viewBox="0 0 900 12">
  <defs>
    <linearGradient id="dv" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fcee0a" stop-opacity="0"/>
      <stop offset="50%" stop-color="#fcee0a" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#fcee0a" stop-opacity="0"/>
    </linearGradient>
    <!-- Traveling data pulse -->
    <linearGradient id="pulse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fcee0a" stop-opacity="0"/>
      <stop offset="40%" stop-color="#fcee0a" stop-opacity="0"/>
      <stop offset="50%" stop-color="#fcee0a" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#fcee0a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#fcee0a" stop-opacity="0"/>
    </linearGradient>
    <filter id="pulseGlow" x="-50%" y="-200%" width="200%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="12" fill="#0c0809"/>

  <!-- Base line -->
  <line x1="0" y1="6" x2="900" y2="6" stroke="url(#dv)" stroke-width="0.5"/>

  <!-- Traveling pulse left-to-right -->
  <rect x="-120" y="4" width="120" height="4" fill="url(#pulse)" filter="url(#pulseGlow)" rx="2">
    <animate attributeName="x" from="-120" to="900" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Small dot markers along the line -->
  <circle cx="150" cy="6" r="1" fill="#fcee0a" opacity="0.15"/>
  <circle cx="300" cy="6" r="1" fill="#fcee0a" opacity="0.15"/>
  <circle cx="450" cy="6" r="1" fill="#fcee0a" opacity="0.15"/>
  <circle cx="600" cy="6" r="1" fill="#fcee0a" opacity="0.15"/>
  <circle cx="750" cy="6" r="1" fill="#fcee0a" opacity="0.15"/>
</svg>
