<svg xmlns="http://www.w3.org/2000/svg" width="750" height="100" viewBox="0 0 750 100">
  <defs>
    <filter id="glow2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <g font-family="'Segoe UI', 'Rajdhani', sans-serif" font-size="14" font-weight="600" letter-spacing="1">
    
    <!-- Row 1 -->
    <!-- TensorFlow -->
    <g transform="translate(30, 10)">
      <path d="M 8 0 L 150 0 L 150 22 L 142 30 L 0 30 L 0 8 Z" fill="rgba(3,216,243,0.05)" stroke="#03d8f3" stroke-width="1" opacity="0.8"/>
      <text x="75" y="20" fill="#03d8f3" text-anchor="middle" filter="url(#glow2)">TENSORFLOW</text>
    </g>

    <!-- PyTorch -->
    <g transform="translate(200, 10)">
      <path d="M 8 0 L 150 0 L 150 22 L 142 30 L 0 30 L 0 8 Z" fill="rgba(3,216,243,0.05)" stroke="#03d8f3" stroke-width="1" opacity="0.8"/>
      <text x="75" y="20" fill="#03d8f3" text-anchor="middle" filter="url(#glow2)">PYTORCH</text>
    </g>

    <!-- Scikit-Learn -->
    <g transform="translate(370, 10)">
      <path d="M 8 0 L 150 0 L 150 22 L 142 30 L 0 30 L 0 8 Z" fill="rgba(3,216,243,0.05)" stroke="#03d8f3" stroke-width="1" opacity="0.8"/>
      <text x="75" y="20" fill="#03d8f3" text-anchor="middle" filter="url(#glow2)">SCIKIT_LEARN</text>
    </g>

    <!-- FastAPI -->
    <g transform="translate(540, 10)">
      <path d="M 8 0 L 150 0 L 150 22 L 142 30 L 0 30 L 0 8 Z" fill="rgba(3,216,243,0.05)" stroke="#03d8f3" stroke-width="1" opacity="0.8"/>
      <text x="75" y="20" fill="#03d8f3" text-anchor="middle" filter="url(#glow2)">FAST_API</text>
    </g>

    <!-- Row 2 -->
    <!-- LangChain -->
    <g transform="translate(115, 55)">
      <path d="M 8 0 L 150 0 L 150 22 L 142 30 L 0 30 L 0 8 Z" fill="rgba(3,216,243,0.05)" stroke="#03d8f3" stroke-width="1" opacity="0.8"/>
      <text x="75" y="20" fill="#03d8f3" text-anchor="middle" filter="url(#glow2)">LANGCHAIN</text>
    </g>

    <!-- LangGraph -->
    <g transform="translate(285, 55)">
      <path d="M 8 0 L 150 0 L 150 22 L 142 30 L 0 30 L 0 8 Z" fill="rgba(3,216,243,0.05)" stroke="#03d8f3" stroke-width="1" opacity="0.8"/>
      <text x="75" y="20" fill="#03d8f3" text-anchor="middle" filter="url(#glow2)">LANGGRAPH</text>
    </g>

    <!-- Streamlit -->
    <g transform="translate(455, 55)">
      <path d="M 8 0 L 150 0 L 150 22 L 142 30 L 0 30 L 0 8 Z" fill="rgba(3,216,243,0.05)" stroke="#03d8f3" stroke-width="1" opacity="0.8"/>
      <text x="75" y="20" fill="#03d8f3" text-anchor="middle" filter="url(#glow2)">STREAMLIT</text>
    </g>

  </g>
</svg>
