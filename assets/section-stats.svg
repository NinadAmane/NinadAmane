<svg xmlns="http://www.w3.org/2000/svg" width="900" height="44" viewBox="0 0 900 44">
  <defs>
    <pattern id="scn" patternUnits="userSpaceOnUse" width="900" height="3">
      <rect width="900" height="1.5" fill="rgba(0,0,0,0.08)"/>
    </pattern>
    <linearGradient id="fadeL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fcee0a" stop-opacity="0"/>
      <stop offset="15%" stop-color="#fcee0a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#fcee0a" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="900" height="44" fill="#0c0809"/>
  <rect y="0" width="900" height="1" fill="url(#fadeL)" opacity="0.3"/>
  <rect x="60" y="12" width="8" height="8" fill="#fcee0a" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="3s" repeatCount="indefinite"/>
  </rect>
  <text x="78" y="21" font-family="'Segoe UI', 'Rajdhani', sans-serif" font-size="13" fill="#fcee0a" opacity="0.85" letter-spacing="5" font-weight="600">DIAGNOSTICS // STATS</text>
  <line x1="310" y1="17" x2="840" y2="17" stroke="#fcee0a" stroke-width="0.3" opacity="0.15"/>
  <rect y="43" width="900" height="1" fill="url(#fadeL)" opacity="0.15"/>
  <rect width="900" height="44" fill="url(#scn)" opacity="0.1"/>
</svg>
