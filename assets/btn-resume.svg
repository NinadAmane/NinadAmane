<svg xmlns="http://www.w3.org/2000/svg" width="300" height="50" viewBox="0 0 300 50">
  <defs>
    <filter id="btnGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#140c10"/>
      <stop offset="100%" stop-color="#0c0809"/>
    </linearGradient>
    <pattern id="btnPattern" patternUnits="userSpaceOnUse" width="300" height="4">
      <rect width="300" height="2" fill="rgba(0,0,0,0.2)"/>
    </pattern>
  </defs>

  <!-- Chamfered shape -->
  <path d="M 12 0 L 300 0 L 300 38 L 288 50 L 0 50 L 0 12 Z" fill="url(#btnGrad)"/>
  
  <!-- Subtle inner background pattern -->
  <path d="M 12 0 L 300 0 L 300 38 L 288 50 L 0 50 L 0 12 Z" fill="url(#btnPattern)" opacity="0.3"/>

  <!-- Border -->
  <path d="M 12 0 L 300 0 L 300 38 L 288 50 L 0 50 L 0 12 Z" fill="none" stroke="#fcee0a" stroke-width="1" opacity="0.4"/>

  <!-- Top accent bar -->
  <rect x="12" y="0" width="100" height="2" fill="#fcee0a" opacity="0.8"/>
  <rect x="270" y="0" width="30" height="2" fill="#fcee0a" opacity="0.8"/>

  <!-- Bottom accent corner -->
  <path d="M 288 50 L 300 38" fill="none" stroke="#fcee0a" stroke-width="2"/>

  <!-- Status dot pulsing -->
  <circle cx="25" cy="25" r="4" fill="#03d8f3" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Glitching text -->
  <style>
    @keyframes textGlow {
      0% { opacity: 0.9; }
      50% { opacity: 0.5; }
      100% { opacity: 0.9; }
    }
    .anim-glow { animation: textGlow 3s infinite; }
  </style>

  <text x="45" y="30" font-family="'Segoe UI', 'Rajdhani', sans-serif" font-size="16" fill="#fcee0a" font-weight="700" letter-spacing="2" filter="url(#btnGlow)" class="anim-glow">
    DOWNLOAD // RESUME
  </text>
  
  <text x="285" y="22" font-family="'Courier New', monospace" font-size="8" fill="#665e56" text-anchor="end" letter-spacing="1">
    SYS.FILE.REQ
  </text>
</svg>
