name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"  # every 12 hours
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=fcee0a&color_dots[0]=1a1510&color_dots[1]=2a2010&color_dots[2]=3d3015&color_dots[3]=554520&color_dots[4]=6e5c28
            dist/github-snake-dark.svg?color_snake=fcee0a&color_dots[0]=1a1510&color_dots[1]=2a2010&color_dots[2]=3d3015&color_dots[3]=554520&color_dots[4]=6e5c28

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
